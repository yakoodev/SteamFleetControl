name: Feature request
description: Propose an improvement or new capability
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred approach
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: UX, API, security, operations, compatibility
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: This request does not include real credentials or private data
          required: true
